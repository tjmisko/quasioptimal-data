# Data source registry for the engineering-workforce section.
#
# Single source of truth for every dataset we want. The pipeline (fetch.py,
# registry.py) reads this; the task cards in TASKS.md reference the `id`s.
#
# Fields per source:
#   id             stable slug (used as source_id in processed tables)
#   name           human name
#   role           denominator | numerator_modern | numerator_historical | covariate
#   definition     which engineer definition it feeds: contemporary | modern | both | n/a
#   geography      list of entities it covers (or "many")
#   years          approximate coverage
#   provider       who publishes it
#   url            landing page or direct link
#   method         github_raw | http_api | portal | registration | offline_scan | book
#   reachable      here | blocked_egress | unknown   (as probed 2026-07-23)
#   raw            path under data/raw/ where the download lands (if applicable)
#   metric         stock | annual_flow | population | n/a
#   priority       1 (highest) .. 3
#   task           task id in TASKS.md
#   status         todo | fetched | processed | blocked
#   notes          caveats / exact codes

sources:

  # ------------------------------------------------------------------ denominators
  - id: maddison-2020
    name: Maddison Project Database 2020 (via OWID mirror)
    role: denominator
    definition: n/a
    geography: [World, United States, China, United Kingdom, Germany, France, many]
    years: "1 AD – 2018 (World from 1820; countries at 1500/1600/1700/1820 then denser)"
    provider: Bolt & van Zanden (2020); mirrored in owid/owid-datasets
    url: https://raw.githubusercontent.com/owid/owid-datasets/master/datasets/Maddison%20Project%20Database%202020%20(Bolt%20and%20van%20Zanden%20(2020))/Maddison%20Project%20Database%202020%20(Bolt%20and%20van%20Zanden%20(2020)).csv
    method: github_raw
    reachable: here
    raw: maddison-2020.csv
    metric: population
    priority: 1
    task: G-POP-01
    status: fetched
    notes: >-
      Columns Entity,Year,GDP per capita,Population,GDP. Primary long-run
      denominator + GDP covariate. Pre-1820 world total absent (use HYDE).

  - id: worldbank-population
    name: World Bank total population (datahub mirror)
    role: denominator
    definition: n/a
    geography: [many]
    years: "1960 – present"
    provider: World Bank WDI SP.POP.TOTL; mirrored in datasets/population
    url: https://raw.githubusercontent.com/datasets/population/main/data/population.csv
    method: github_raw
    reachable: here
    raw: worldbank-population.csv
    metric: population
    priority: 2
    task: G-POP-01
    status: fetched
    notes: Modern cross-check for Maddison; Country Name,Country Code,Year,Value.

